name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/talent_hub_test?sslmode=disable
      SESSION_SECRET: test-session-secret-which-is-long-enough-for-ci
      ADMIN_USERNAME: TalentHubAdmin
      ADMIN_EMAIL: admin@talent-hub.local
      ADMIN_PASSWORD: P@ssw0rd
      ADMIN_IS_SUPER_ADMIN: "true"
      APP_BASE_URL: http://127.0.0.1:3000
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      NEXT_TELEMETRY_DISABLED: "1"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: talent_hub_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d talent_hub_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply database migrations
        run: pnpm db:migrate:deploy

      - name: Type check
        run: pnpm type-check

      - name: Run unit tests
        run: pnpm test

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: pnpm test:e2e

      - name: Production build
        run: pnpm build